<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Float · Real-time Currency Converter (incl. MMK)</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      opacity: 0.5;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(4px);
    }
    .refresh-spin {
      transition: transform 0.4s ease;
    }
    .refresh-spin:hover {
      transform: rotate(180deg);
    }
    .transition-smooth {
      transition: all 0.2s ease;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-indigo-900 to-emerald-900 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-lg mx-auto">
    <!-- brand + real-time indicator -->
    <div class="text-center mb-4">
      <div class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-md rounded-full px-5 py-2 shadow-lg border border-white/20">
        <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
        <span class="text-white font-medium text-sm tracking-wide">LIVE FOREX API · REAL-TIME RATES</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white/80" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
      </div>
    </div>

    <!-- main converter card -->
    <div class="glass-card rounded-3xl shadow-2xl overflow-hidden border border-white/40">
      <div class="px-6 pt-7 pb-7">
        <!-- header logo and title -->
        <div class="flex items-center justify-between mb-6">
          <div class="flex items-center gap-2">
            <div class="bg-emerald-100 p-2 rounded-xl">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-emerald-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Float <span class="text-emerald-600">convert</span></h1>
          </div>
          <button id="manualRefreshBtn" class="p-2 rounded-full hover:bg-slate-100 transition-smooth refresh-spin" title="Refresh real-time rates">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
          </button>
        </div>

        <!-- Amount Input -->
        <div class="mb-6">
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5 ml-1">ငွေပမာဏ</label>
          <div class="relative">
            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium text-lg">💰</div>
            <input type="number" id="amountInput" value="1.00" step="any" placeholder="0.00" class="w-full pl-12 pr-4 py-3.5 text-xl font-semibold rounded-2xl border border-slate-200 shadow-sm focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 transition outline-none bg-white text-slate-800">
          </div>
        </div>

        <!-- Currency selectors and swap -->
        <div class="flex items-center gap-3 mb-7">
          <div class="flex-1">
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1 ml-1">မှ</label>
            <select id="fromCurrency" class="w-full bg-white border border-slate-200 rounded-2xl py-3 px-3 text-slate-700 font-medium focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 outline-none transition cursor-pointer shadow-sm">
            </select>
          </div>
          <div class="mt-6 flex-shrink-0">
            <button id="swapBtn" class="p-3 rounded-full bg-emerald-50 hover:bg-emerald-100 text-emerald-600 transition-all duration-200 shadow-sm hover:shadow-md focus:ring-2 focus:ring-emerald-300 group">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-active:scale-90 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
              </svg>
            </button>
          </div>
          <div class="flex-1">
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1 ml-1">သို့</label>
            <select id="toCurrency" class="w-full bg-white border border-slate-200 rounded-2xl py-3 px-3 text-slate-700 font-medium focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 outline-none transition cursor-pointer shadow-sm">
            </select>
          </div>
        </div>

        <!-- Convert button + live timestamp -->
        <div class="mb-6">
          <button id="convertBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-2xl transition-all duration-200 shadow-md hover:shadow-xl flex items-center justify-center gap-2 active:scale-[0.98] text-base">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
            </svg>
            ပြောင်းလဲမည်
          </button>
          <div id="liveStatus" class="flex items-center justify-center gap-2 mt-2 text-xs text-slate-500">
            <span id="statusDot" class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
            <span id="rateTimestamp">ငွေလဲနှုန်းများ ရယူနေသည်...</span>
          </div>
        </div>

        <!-- Dynamic Result Card -->
        <div id="resultCard" class="bg-gradient-to-br from-emerald-50 to-slate-50 rounded-2xl p-5 border border-emerald-200 shadow-lg transition-all duration-300">
          <div class="flex justify-between items-start flex-wrap gap-3">
            <div>
              <span class="text-xs font-bold text-emerald-700 uppercase tracking-wider">ပြောင်းလဲပြီးငွေ</span>
              <div class="text-4xl font-extrabold text-slate-800 mt-1 flex items-baseline flex-wrap gap-1">
                <span id="convertedAmount">—</span>
                <span id="toSymbol" class="text-xl font-semibold text-slate-500"></span>
              </div>
            </div>
            <div class="bg-white rounded-xl px-3 py-2 shadow-sm text-right">
              <div class="text-[10px] text-slate-400 uppercase">လက်ရှိဈေး</div>
              <div id="rateDisplay" class="text-sm font-mono font-bold text-slate-700">—</div>
            </div>
          </div>
          <div class="border-t border-emerald-200 mt-4 pt-3 text-xs text-slate-500 flex justify-between items-center">
            <span id="inverseHint" class="italic">↻ 1 USD = ?</span>
            <span id="specialNote" class="bg-emerald-100 px-2 py-0.5 rounded-full text-emerald-700 font-medium text-[11px]">🇲🇲 MMK အပါအဝင်</span>
          </div>
        </div>

        <p class="text-[10px] text-center text-slate-400 mt-5">⚡ Real-time API via exchangerate-api.com • မြန်မာကျပ် (MMK) ပါဝင်သည်</p>
      </div>
    </div>
  </div>

  <!-- External JavaScript file -->
  <script src="../js/app.js"></script>
</body>
</html>
